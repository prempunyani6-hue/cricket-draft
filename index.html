<!DOCTYPE html>
<html>
<head>
  <title>Cricket Draft System</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    .box {
      background: white;
      width: 300px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      width: 80%;
    }

    button {
      cursor: pointer;
    }

    ul {
      padding: 0;
    }

    li {
      list-style: none;
      padding: 5px;
      background: #ddd;
      margin: 5px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>🏏 Cricket Draft System</h1>

<div class="box">
  <h2>Add Player</h2>
  <input type="text" id="playerName" placeholder="Enter player name">
  <button onclick="addPlayer()">Add Player</button>
</div>

<div class="box">
  <h2>Players List</h2>
  <ul id="list"></ul>
</div>

<script>
let players = [];

function addPlayer() {
  let name = document.getElementById("playerName").value;

  if (name === "") {
    alert("Naam likho pehle");
    return;
  }

  players.push(name);
  document.getElementById("playerName").value = "";
  showPlayers();
}

function showPlayers() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  players.forEach((p) => {
    let li = document.createElement("li");
    li.innerText = p;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
