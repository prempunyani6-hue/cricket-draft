<!DOCTYPE html>
<html>
<head>
  <title>Cricket Draft FIX</title>
  <style>
    body { font-family: Arial; text-align:center; background:#f2f2f2; }
    .box { background:white; margin:10px auto; padding:15px; width:320px; border-radius:10px; }
    input, button { padding:8px; margin:5px; width:80%; }
    ul { padding:0; }
    li { list-style:none; padding:5px; background:#ddd; margin:5px; border-radius:5px; }
  </style>
</head>

<body>

<h1>🏏 FIXED CRICKET DRAFT</h1>

<div class="box">
  <input id="playerName" placeholder="Enter player">
  <button onclick="addPlayer()">Add Player</button>
</div>

<div class="box">
  <h3>Available Players</h3>
  <ul id="players"></ul>
</div>

<div class="box">
  <button onclick="addToTeam('A')">Add to Team A</button>
  <button onclick="addToTeam('B')">Add to Team B</button>
</div>

<div class="box">
  <h3>Team A</h3>
  <ul id="teamA"></ul>
</div>

<div class="box">
  <h3>Team B</h3>
  <ul id="teamB"></ul>
</div>

<script>
let players = [];

function addPlayer() {
  let name = document.getElementById("playerName").value;
  if(!name) return;

  players.push(name);
  document.getElementById("playerName").value = "";
  renderPlayers();
}

function renderPlayers() {
  let list = document.getElementById("players");
  list.innerHTML = "";

  players.forEach((p, index) => {
    let li = document.createElement("li");
    li.innerText = p;
    list.appendChild(li);
  });
}

function addToTeam(team) {
  if(players.length === 0) return alert("No players");

  let player = players.shift(); // remove first player

  if(team === "A") {
    document.getElementById("teamA").innerHTML += "<li>"+player+"</li>";
  } else {
    document.getElementById("teamB").innerHTML += "<li>"+player+"</li>";
  }

  renderPlayers();
}
</script>

</body>
</html>
