<!DOCTYPE html>
<html>
<head>
  <title>Live Cricket Draft</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    body { font-family: Arial; text-align:center; background:#f2f2f2; }
    .box { background:white; margin:10px auto; padding:15px; width:320px; border-radius:10px; }
    input, button { padding:8px; margin:5px; width:80%; }
    li { list-style:none; padding:5px; background:#ddd; margin:5px; border-radius:5px; }
  </style>
</head>

<body>

<h1>🏏 LIVE CRICKET DRAFT</h1>

<div class="box">
  <input id="playerName" placeholder="Enter player">
  <button onclick="addPlayer()">Add Player</button>
</div>

<div class="box">
  <h3>Available Players</h3>
  <ul id="players"></ul>
</div>

<div class="box">
  <button onclick="addToTeam('A')">Add to Team A</button>
  <button onclick="addToTeam('B')">Add to Team B</button>
</div>

<div class="box">
  <h3>Team A</h3>
  <ul id="teamA"></ul>
</div>

<div class="box">
  <h3>Team B</h3>
  <ul id="teamB"></ul>
</div>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  databaseURL: "YOUR_DATABASE_URL_HERE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// =======================
// ADD PLAYER
// =======================
function addPlayer() {
  let name = document.getElementById("playerName").value;
  if(!name) return;

  db.ref("players").push(name);
  document.getElementById("playerName").value = "";
}

// =======================
// ADD TO TEAM (FIXED)
// =======================
function addToTeam(team) {
  db.ref("players").once("value", (snapshot) => {
    let firstKey = null;
    let firstValue = null;

    snapshot.forEach((child) => {
      firstKey = child.key;
      firstValue = child.val();
      return true;
    });

    if(!firstKey) return alert("No players");

    // remove from players
    db.ref("players/" + firstKey).remove();

    // add to team
    if(team === "A") {
      db.ref("teamA").push(firstValue);
    } else {
      db.ref("teamB").push(firstValue);
    }
  });
}

// =======================
// LIVE PLAYERS
// =======================
db.ref("players").on("value", (snapshot) => {
  document.getElementById("players").innerHTML = "";

  snapshot.forEach((child) => {
    let li = document.createElement("li");
    li.innerText = child.val();
    document.getElementById("players").appendChild(li);
  });
});

// =======================
// TEAM A LIVE
// =======================
db.ref("teamA").on("value", (snapshot) => {
  document.getElementById("teamA").innerHTML = "";
  snapshot.forEach((child) => {
    let li = document.createElement("li");
    li.innerText = child.val();
    document.getElementById("teamA").appendChild(li);
  });
});

// =======================
// TEAM B LIVE
// =======================
db.ref("teamB").on("value", (snapshot) => {
  document.getElementById("teamB").innerHTML = "";
  snapshot.forEach((child) => {
    let li = document.createElement("li");
    li.innerText = child.val();
    document.getElementById("teamB").appendChild(li);
  });
});

</script>

</body>
</html>
