<!DOCTYPE html>
<html>
<head>
  <title>PRO Cricket Draft</title>
  <style>
    body { font-family: Arial; text-align:center; background:#f2f2f2; }
    .box { background:white; padding:15px; margin:10px auto; width:320px; border-radius:10px; }
    input, button { padding:8px; margin:5px; width:80%; }
    ul { padding:0; }
    li { list-style:none; padding:5px; background:#ddd; margin:5px; border-radius:5px; }
  </style>
</head>

<body>

<h1>🏏 PRO LIVE DRAFT</h1>

<div class="box">
  <input id="player" placeholder="Enter player">
  <button onclick="addPlayer()">Add Player</button>
</div>

<div class="box">
  <h3>Live Players</h3>
  <ul id="list"></ul>
</div>

<div class="box">
  <button onclick="assign('A')">Send to Team A</button>
  <button onclick="assign('B')">Send to Team B</button>

  <h3>Team A</h3>
  <ul id="teamA"></ul>

  <h3>Team B</h3>
  <ul id="teamB"></ul>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔴 FIREBASE CONFIG YAHAN DAALO
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const playersRef = collection(db, "players");

const teamARef = collection(db, "teamA");
const teamBRef = collection(db, "teamB");

// ADD PLAYER
window.addPlayer = async function() {
  let name = document.getElementById("player").value;
  if(!name) return;

  await addDoc(playersRef, { name });
  document.getElementById("player").value = "";
}

// REAL TIME PLAYERS
onSnapshot(playersRef, (snap) => {
  let list = document.getElementById("list");
  list.innerHTML = "";
  snap.forEach(doc => {
    let li = document.createElement("li");
    li.innerText = doc.data().name;
    list.appendChild(li);
  });
});

// ASSIGN TEAM
window.assign = async function(team) {
  let snap = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js");
  
  let { getDocs, deleteDoc, doc } = snap;

  let data = await getDocs(playersRef);
  if(data.empty) return alert("No players");

  let first = data.docs[0];
  let name = first.data().name;

  await deleteDoc(doc(db, "players", first.id));

  if(team === 'A') {
    await addDoc(teamARef, { name });
  } else {
    await addDoc(teamBRef, { name });
  }
}

// TEAM A LIVE
onSnapshot(teamARef, (snap) => {
  let list = document.getElementById("teamA");
  list.innerHTML = "";
  snap.forEach(d => {
    let li = document.createElement("li");
    li.innerText = d.data().name;
    list.appendChild(li);
  });
});

// TEAM B LIVE
onSnapshot(teamBRef, (snap) => {
  let list = document.getElementById("teamB");
  list.innerHTML = "";
  snap.forEach(d => {
    let li = document.createElement("li");
    li.innerText = d.data().name;
    list.appendChild(li);
  });
});

</script>

</body>
</html>
